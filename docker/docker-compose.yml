services:
  postgres:
    image: postgres:17
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MUSICAS_DB_USER: ${MUSICAS_DB_USER}
      MUSICAS_DB_PASSWORD: ${MUSICAS_DB_PASSWORD}
      PASTORAL_DB_USER: ${PASTORAL_DB_USER}
      PASTORAL_DB_PASSWORD: ${PASTORAL_DB_PASSWORD}
      FINANCEIRO_DB_USER: ${FINANCEIRO_DB_USER}
      FINANCEIRO_DB_PASSWORD: ${FINANCEIRO_DB_PASSWORD}
      AULAS_DB_USER: ${AULAS_DB_USER}
      AULAS_DB_PASSWORD: ${AULAS_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dozzle:
    image: amir20/dozzle:latest
    container_name: homelab-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: homelab-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: homelab_postgres_data

networks:
  default:
    name: homelab
