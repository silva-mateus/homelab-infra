  #     Session__CookieDomain: ${AULAS_COOKIE_DOMAIN}

  # gestao-aulas-web:
  #   image: ghcr.io/${GITHUB_USER}/gestao-aulas-web:latest
  #   container_name: gestao-aulas-web
  #   restart: unless-stopped
  #   environment:
  #     BACKEND_URL: http://gestao-aulas-api:5000
  #   depends_on:
  #     - gestao-aulas-api

volumes:
  musicas_data:
    name: homelab_musicas_data
  musicas_organized:
    name: homelab_musicas_organized
  portfolio_highscores:
    name: homelab_portfolio_highscores

# Use together with docker-compose.yml so all services share the homelab network:
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d
