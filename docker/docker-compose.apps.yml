services:
  # ============================================================
  # Musicas Igreja
  # ============================================================
  musicas-igreja-api:
    image: ghcr.io/${GITHUB_USER}/musicas-igreja-api:latest
    container_name: musicas-igreja-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=musicas_igreja;Username=${MUSICAS_DB_USER};Password=${MUSICAS_DB_PASSWORD}"
    volumes:
      - musicas_data:/app/data
      - musicas_organized:/app/organized

  musicas-igreja-web:
    image: ghcr.io/${GITHUB_USER}/musicas-igreja-web:latest
    container_name: musicas-igreja-web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://musicas-igreja-api:5000
    depends_on:
      - musicas-igreja-api

  # ============================================================
  # Portfolio
  # ============================================================
  portfolio:
    image: ghcr.io/${GITHUB_USER}/portfolio:latest
    container_name: portfolio
    restart: unless-stopped

  portfolio-api:
    image: ghcr.io/${GITHUB_USER}/portfolio-api:latest
    container_name: portfolio-api
    restart: unless-stopped
    volumes:
      - portfolio_highscores:/app/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      CORS_ORIGINS: https://resume.networkmat.uk
      SMTP_USER: ${SMTP_USER}
      SMTP_APP_PASSWORD: ${SMTP_APP_PASSWORD}
      SMTP_TO: ${SMTP_TO}
      SMTP_FROM: ${SMTP_FROM}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3


  # ============================================================
  # Notes (Jekyll)
  # ============================================================
  notes:
    image: ghcr.io/${GITHUB_USER}/notes:latest
    container_name: notes
    restart: unless-stopped

  # ============================================================
  # Gerenciamento Pastoral
  # ============================================================
  # gerenciamento-pastoral-api:
  #   image: ghcr.io/${GITHUB_USER}/gerenciamento-pastoral-api:latest
  #   container_name: gerenciamento-pastoral-api
  #   restart: unless-stopped
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: Production
  #     ASPNETCORE_URLS: http://+:5000
  #     ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=gerenciamento_pastoral;Username=${PASTORAL_DB_USER};Password=${PASTORAL_DB_PASSWORD}"

  # gerenciamento-pastoral-web:
  #   image: ghcr.io/${GITHUB_USER}/gerenciamento-pastoral-web:latest
  #   container_name: gerenciamento-pastoral-web
  #   restart: unless-stopped
  #   environment:
  #     BACKEND_URL: http://gerenciamento-pastoral-api:5000
  #   depends_on:
  #     - gerenciamento-pastoral-api

  # ============================================================
  # Gerenciamento Financeiro
  # ============================================================
  gerenciamento-financeiro-api:
    image: ghcr.io/${GITHUB_USER}/gerenciamento-financeiro-api:latest
    container_name: gerenciamento-financeiro-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=gerenciamento_financeiro;Username=${FINANCEIRO_DB_USER};Password=${FINANCEIRO_DB_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      Session__CookieDomain: ${FINANCEIRO_COOKIE_DOMAIN}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  gerenciamento-financeiro-web:
    image: ghcr.io/${GITHUB_USER}/gerenciamento-financeiro-web:latest
    container_name: gerenciamento-financeiro-web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://gerenciamento-financeiro-api:5000
      NGINX_ENVSUBST_FILTER: BACKEND
    depends_on:
      - gerenciamento-financeiro-api

  # ============================================================
