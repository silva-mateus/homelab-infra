# Cloudflare Tunnel configuration
# This file maps public hostnames to internal services.
# Actual tunnel config is managed via Cloudflare dashboard when using TUNNEL_TOKEN.
#
# If using config file mode instead of token, place this at:
#   ~/.cloudflared/config.yml
#
# Example ingress rules:
#
# tunnel: <your-tunnel-id>
# credentials-file: /root/.cloudflared/<tunnel-id>.json
#
# ingress:
#   - hostname: financeiro.yourdomain.com
#     service: http://gerenciamento-financeiro-web:80
#   - hostname: musicas.yourdomain.com
#     service: http://musicas-igreja-web:80
#   - hostname: pastoral.yourdomain.com
#     service: http://gerenciamento-pastoral-web:80
#   - hostname: aulas.yourdomain.com
#     service: http://gestao-aulas-web:80
#   - hostname: portfolio.yourdomain.com
#     service: http://portfolio:80
#   - hostname: logs.yourdomain.com
#     service: http://homelab-dozzle:8080
#   - service: http_status:404
