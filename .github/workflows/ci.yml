name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate docker-compose files
        working-directory: docker
        # GHA não tem o .env do servidor (gitignored). Usar o template para interpolar variáveis.
        run: |
          docker compose --env-file .env.example -f docker-compose.yml config --quiet
          docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.apps.yml config --quiet

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: self-hosted
    steps:
      - name: Sync repo and restart services
        run: |
          cd /opt/homelab
          # Alinhar com origin/main (evita falha quando há edições locais em scripts)
          git fetch origin
          git reset --hard origin/main
          cd docker
          docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d
